<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="author" content="The Gamerz">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
      font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* animated bg glow */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 40%, rgba(59,130,246,0.1), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* header */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .glow-text {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #facc15, #3b82f6, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      text-shadow: 0 0 10px rgba(59,130,246,0.3);
    }

    .sub {
      color: #94a3b8;
      margin-top: 0.5rem;
      font-size: 1rem;
    }

    .stats-bar {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 1.5rem;
      margin-top: 1rem;
      border: 1px solid rgba(59,130,246,0.3);
      font-size: 0.85rem;
    }

    /* search & filter */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 2rem 0 2rem;
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 80px;
      padding: 0.6rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .search-box {
      display: flex;
      align-items: center;
      background: #0f172a;
      border-radius: 48px;
      padding: 0.4rem 1.2rem;
      gap: 10px;
      border: 1px solid #334155;
      flex: 1;
      max-width: 360px;
    }

    .search-box i {
      color: #60a5fa;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 0.95rem;
      padding: 0.6rem 0;
      width: 100%;
    }

    .search-box input::placeholder {
      color: #64748b;
    }

    .counter {
      background: #0f172a;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.85rem;
    }

    /* game grid */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }

    /* game card */
    .game-card {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 1.8rem;
      padding: 1.2rem;
      transition: all 0.25s ease;
      border: 1px solid rgba(71, 85, 105, 0.5);
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      background: rgba(30, 41, 59, 0.9);
      box-shadow: 0 20px 30px -15px rgba(0,0,0,0.5);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    .game-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(145deg, #2563eb, #7c3aed);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 8px 12px -6px #1e1b4b;
    }

    .game-title {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      word-break: break-word;
      line-height: 1.3;
    }

    .play-btn {
      margin-top: auto;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border: none;
      padding: 0.7rem 0;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.9rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      text-decoration: none;
      text-align: center;
    }

    .play-btn:hover {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      gap: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(0,0,0,0.3);
      border-radius: 2rem;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      padding-top: 1.8rem;
      border-top: 1px solid rgba(148,163,184,0.15);
      font-size: 0.75rem;
      color: #6c7a9e;
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .glow-text { font-size: 2rem; }
      .controls { border-radius: 32px; flex-direction: column; align-items: stretch; }
      .search-box { max-width: 100%; }
    }
  </style>
</head>

  // Get a fun icon emoji per game
  function getGameIcon(gameNameRaw, fileName) {
    const lower = fileName.toLowerCase();
    if (lower.includes('fnaf')) return '🐻';
    if (lower.includes('pokemon')) return '⚡';
    if (lower.includes('mario')) return '🍄';
    if (lower.includes('retrobowl')) return '🏈';
    if (lower.includes('1v1lol')) return '🔫';
    if (lower.includes('agario')) return '🟢';
    if (lower.includes('amongus')) return '👾';
    if (lower.includes('geometrydash')) return '🔺';
    if (lower.includes('drifthunters')) return '🏎️';
    if (lower.includes('fruitninja')) return '🍉';
    if (lower.includes('subwaysurfers')) return '🚇';
    if (lower.includes('sonic')) return '💨';
    if (lower.includes('granny')) return '👵';
    if (lower.includes('vex')) return '🧗';
    if (lower.includes('slope')) return '⛰️';
    if (lower.includes('ovo')) return '🥚';
    if (lower.includes('paperio')) return '📄';
    if (lower.includes('doom')) return '👹';
    if (lower.includes('celeste')) return '🏔️';
    if (lower.includes('eaglercraft')) return '⛏️';
    return '🎮';

  // Build game objects
  function buildGameList() {
    return GAME_FILES.map(fileName => {
      const fullUrl = BASE_URL + fileName;
      const displayName = formatGameName(fileName);
      return {
        id: fileName,
        name: displayName,
        url: fullUrl,
        fileName: fileName,
        icon: getGameIcon(displayName, fileName)
      };
    });
  }

  let allGames = buildGameList();
  let filteredGames = [...allGames];

  // DOM elements
  const gamesContainer = document.getElementById('gamesContainer');
  const searchInput = document.getElementById('searchInput');
  const visibleSpan = document.getElementById('visibleCount');
  const totalSpan = document.getElementById('totalCount');
  const gameCountDisplay = document.getElementById('gameCountDisplay');

  // Update counters
  function updateCounters() {
    totalSpan.innerText = allGames.length;
    gameCountDisplay.innerText = allGames.length;
    visibleSpan.innerText = filteredGames.length;
  }

  // Render grid
  function renderGames() {
    if (filteredGames.length === 0) {
      gamesContainer.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-search" style="font-size: 3rem; opacity: 0.6;"></i>
          <h3 style="margin: 1rem 0 0.5rem;">No games found</h3>
          <p>Try a different search term or browse all games above.</p>
        </div>
      `;
      updateCounters();
      return;
    }

    let html = '';
    for (const game of filteredGames) {
      html += `
        <div class="game-card">
          <div class="card-header">
            <div class="game-icon">${game.icon}</div>
            <div class="game-title">${escapeHtml(game.name)}</div>
          </div>
          <div style="margin-bottom: 1rem; font-size: 0.75rem; color: #94a3b8; display: flex; gap: 8px; align-items: center;">
            <i class="fas fa-file-code"></i> <span style="font-family: monospace;">${escapeHtml(game.fileName)}</span>
          </div>
          <a href="${game.url}" target="_blank" rel="noopener noreferrer" class="play-btn">
            <i class="fas fa-play"></i> Play Now
            <i class="fas fa-external-link-alt" style="font-size: 0.7rem;"></i>
          </a>
        </div>
      `;
    }
    gamesContainer.innerHTML = html;
    updateCounters();
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // filter logic
  function filterGames() {
    const query = searchInput.value.trim().toLowerCase();
    if (!query) {
      filteredGames = [...allGames];
    } else {
      filteredGames = allGames.filter(game => 
        game.name.toLowerCase().includes(query) || 
        game.fileName.toLowerCase().includes(query)
      );
    }
    renderGames();
  }

  // event listeners
  searchInput.addEventListener('input', filterGames);

  // initial render
  renderGames();
